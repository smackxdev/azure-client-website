<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Azure Client</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1e3c72, #0f2027);
    color: white;
    overflow-x: hidden;
}

/* PARTICLES BG */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* CONTAINER */
.container {
    text-align: center;
    margin-top: 120px;
}

/* TITLE */
h1 {
    font-size: 60px;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    -webkit-background-clip: text;
    color: transparent;
}

/* SUBTEXT */
p {
    font-size: 18px;
    opacity: 0.8;
}

/* DOWNLOAD CARD */
.download-card {
    margin: 50px auto;
    width: 350px;
    padding: 20px;
    border-radius: 18px;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.download-card:hover {
    transform: translateY(-6px) scale(1.05);
    box-shadow: 0 25px 60px rgba(0,0,0,0.8);
}

.icon {
    font-size: 30px;
}

.text {
    text-align: left;
}

.title {
    font-weight: bold;
    font-size: 18px;
}

.sub {
    font-size: 13px;
    opacity: 0.8;
}

.arrow {
    font-size: 22px;
    transition: 0.3s;
}

.download-card:hover .arrow {
    transform: translateX(6px);
}

/* SOCIAL BUTTONS */
.socials {
    margin-top: 50px;
}

.btn {
    display: inline-block;
    margin: 10px;
    padding: 12px 25px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.discord {
    background: #5865F2;
}

.github {
    background: #24292e;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
}

/* FOOTER */
.box {
    margin-top: 40px;
    opacity: 0.7;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">
    <h1>🚀 Azure Client</h1>
    <p>Minecraft 1.8 Client with ViaMCP (Change version in-game)</p>

    <a href="https://tuo-link-download.com" target="_blank">
        <div class="download-card">
            <div class="icon">⬇️</div>
            <div class="text">
                <div class="title">Download Now</div>
                <div class="sub">Latest Version • Fast & Secure</div>
            </div>
            <div class="arrow">→</div>
        </div>
    </a>

    <div class="box">
        <p>Version 1.0</p>
        <p>Compatible with modern versions</p>
    </div>

    <div class="socials">
        <a href="https://discord.gg/TUO_LINK" target="_blank" class="btn discord">Discord</a>
        <a href="https://github.com/TUO_PROFILO" target="_blank" class="btn github">GitHub</a>
    </div>
</div>

<script>
/* PARTICLES BACKGROUND */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        size: Math.random()*2,
        speed: Math.random()*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        p.y += p.speed;
        if(p.y > canvas.height) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
