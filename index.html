<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Azure Client</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    overflow: hidden;
    cursor: none;
}

/* BACKGROUND ANIMATO */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,114,255,0.15), transparent);
    animation: moveBg 12s linear infinite;
    z-index: -1;
}

@keyframes moveBg {
    0% {transform: translate(0,0);}
    50% {transform: translate(-25%, -25%);}
    100% {transform: translate(0,0);}
}

/* CONTENUTO */
.container {
    margin-top: 100px;
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    font-size: 55px;
    text-shadow: 0 0 20px rgba(0, 198, 255, 0.9);
}

p {
    font-size: 18px;
    opacity: 0.85;
}

/* DOWNLOAD BUTTON */
.download-btn {
    margin-top: 30px;
    padding: 15px 40px;
    font-size: 20px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    border: none;
    border-radius: 12px;
    color: white;
    cursor: none;
    transition: 0.3s;
    box-shadow: 0 0 20px rgba(0,114,255,0.7);
}

.download-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 35px rgba(0,114,255,1);
}

.download-btn:active {
    transform: scale(0.92);
}

/* BOX */
.box {
    margin-top: 40px;
}

/* SOCIAL */
.socials {
    margin-top: 40px;
}

.btn {
    display: inline-block;
    margin: 10px;
    padding: 12px 25px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-size: 16px;
    transition: 0.3s;
    cursor: none;
}

.discord {
    background: #5865F2;
    box-shadow: 0 0 15px #5865F2;
}

.discord:hover {
    transform: translateY(-4px) scale(1.05);
}

.github {
    background: #222;
    box-shadow: 0 0 15px #000;
}

.github:hover {
    transform: translateY(-4px) scale(1.05);
}

/* CARD */
.card {
    margin: 50px auto;
    padding: 20px;
    width: 300px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

/* CURSORE */
.cursor {
    position: fixed;
    width: 10px;
    height: 10px;
    background: #00c6ff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    box-shadow: 0 0 15px #00c6ff;
    transition: transform 0.1s ease;
}

/* TRAIL */
.trail {
    position: fixed;
    width: 6px;
    height: 6px;
    background: rgba(0,198,255,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 Azure Client</h1>
    <p>Minecraft 1.8 client with ViaMCP (multi-version support)</p>

    <a href="client.zip" download>
        <button class="download-btn">⬇ Download Now</button>
    </a>

    <div class="box">
        <p>Version: 1.0</p>
        <p>✔ Compatible with modern versions</p>
    </div>

    <div class="socials">
        <a href="https://discord.gg/soon" target="_blank" class="btn discord">💬 Discord</a>
        <a href="https://github.com/soon" target="_blank" class="btn github">💻 GitHub</a>
    </div>

    <div class="card">
        <h3>✨ Features</h3>
        <p>✔ ViaMCP integration</p>
        <p>✔ Smooth performance</p>
        <p>✔ Custom mods</p>
    </div>
</div>

<script>
const cursor = document.createElement("div");
cursor.classList.add("cursor");
document.body.appendChild(cursor);

const trails = [];
for (let i = 0; i < 12; i++) {
    const t = document.createElement("div");
    t.classList.add("trail");
    document.body.appendChild(t);
    trails.push({el: t, x: 0, y: 0});
}

let mouseX = 0, mouseY = 0;

document.addEventListener("mousemove", e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function animate() {
    let x = mouseX;
    let y = mouseY;

    trails.forEach((trail, i) => {
        trail.x += (x - trail.x) * 0.3;
        trail.y += (y - trail.y) * 0.3;

        trail.el.style.left = trail.x + "px";
        trail.el.style.top = trail.y + "px";

        x = trail.x;
        y = trail.y;
    });

    cursor.style.left = mouseX + "px";
    cursor.style.top = mouseY + "px";

    requestAnimationFrame(animate);
}

animate();

/* CLICK EFFECT */
document.addEventListener("click", e => {
    const ripple = document.createElement("div");
    ripple.style.position = "fixed";
    ripple.style.left = e.clientX + "px";
    ripple.style.top = e.clientY + "px";
    ripple.style.width = "10px";
    ripple.style.height = "10px";
    ripple.style.border = "2px solid #00c6ff";
    ripple.style.borderRadius = "50%";
    ripple.style.pointerEvents = "none";
    ripple.style.transform = "translate(-50%, -50%)";
    ripple.style.animation = "ripple 0.6s ease-out";
    document.body.appendChild(ripple);

    setTimeout(() => ripple.remove(), 600);
});

const style = document.createElement("style");
style.innerHTML = `
@keyframes ripple {
    from {opacity: 1; transform: translate(-50%, -50%) scale(1);}
    to {opacity: 0; transform: translate(-50%, -50%) scale(6);}
}`;
document.head.appendChild(style);
</script>

</body>
</html>
